{% extends "base.html" %}

{% block title %}New Family — Family Tree{% endblock %}

{% block body_class %}page-form{% endblock %}

{% block content %}
<h2 class="page-title">Create a New Family</h2>
<div class="form-card">
    <form method="post">
        <div class="form-section">
            <label for="name">Family Name</label>
            <input type="text" id="name" name="name" value="{{ name }}" required placeholder="e.g. The Chowdhury Family" autofocus>
        </div>
        <button type="submit">Create Family</button>
    </form>
</div>
{% endblock %}
