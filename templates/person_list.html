{% extends "base.html" %}

{% block title %}People — Chowdhury Family Tree{% endblock %}

{% block content %}
<h2>People</h2>

<form method="get" role="search" style="margin-bottom: 1rem;">
    <input type="search" name="q" value="{{ search }}" placeholder="Search people...">
</form>

{% if people %}
<figure>
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Birth Name</th>
            <th>Date of Birth</th>
            <th>Place of Birth</th>
        </tr>
    </thead>
    <tbody>
        {% for p in people %}
        <tr>
            <td><a href="{{ url_for('person_detail', person_id=p.id) }}">{{ p.first_name }} {% if p.middle_name %}{{ p.middle_name }} {% endif %}{{ p.last_name }}</a></td>
            <td>{% if p.birth_name_first or p.birth_name_last %}{{ p.birth_name_first or p.first_name }} {{ p.birth_name_last or p.last_name }}{% endif %}</td>
            <td>{{ p.date_of_birth or '' }}</td>
            <td>{{ p.place_of_birth or '' }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</figure>
{% else %}
<p>No people found. <a href="{{ url_for('person_new') }}">Add someone</a>.</p>
{% endif %}
{% endblock %}
